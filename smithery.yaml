# Smithery configuration for SPECTRE
runtime: "container"

build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."

startCommand:
  type: "stdio"
  configSchema:
    type: "object"
    properties:
      GEMINI_API_KEY:
        type: "string"
        description: "Google Gemini 2.0 API Key for autonomous Identity Disambiguation (Optional for plugin use)."
  
  # Function to generate the execution command from the user config
  commandFunction: |
    (config) => ({
      command: "docker",
      args: [
        "run", 
        "-i", 
        "--rm", 
        "-e", `GEMINI_API_KEY=${config.GEMINI_API_KEY || ""}`, 
        "spectre-osint"
      ],
      env: {
        GEMINI_API_KEY: config.GEMINI_API_KEY
      }
    })
